<body>
<div id="root"></div>
<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const SB_URL='https://ovddwmohblsvnrpmshtq.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92ZGR3bW9oYmxzdm5ycG1zaHRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1NDU4NjUsImV4cCI6MjA5OTEyMTg2NX0.zWLc3TdVIqc6zZWGbeGKdrat9ks2znSLmqZmGLOYZnw';
const sb=supabase.createClient(SB_URL,SB_KEY);
const SESSION_KEY='compras_session';

// ── HASH ──────────────────────────────────────────────────────────────────
async function hashSenha(senha){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(senha));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── STATE ─────────────────────────────────────────────────────────────────
let S={user:null,page:'dashboard',modal:null,
  lojas:[],sol:[],forn:[],cot:[],ped:[],users:[],loading:false};

// ── CONSTANTS ─────────────────────────────────────────────────────────────
const CATS=['Limpeza','EPI / Segurança','Informática','Manutenção Predial','Papelaria','Marketing','Ferramentas','Uniformes','Hidráulica / Elétrica','Peças e Equipamentos','Outros'];
const AREAS=['Administrativo','Comercial','Financeiro','Marketing','Manutenção','Pós-venda','Recursos Humanos','TI','Outros'];
const GRUPOS=['TODOS','DHG','BMMOT'];
const PERFIS={
  gestor:    {label:'Gestor',        color:'#1565C0', bg:'#E3F2FD'},
  diretoria: {label:'Diretoria',     color:'#6A1B9A', bg:'#F3E5F5'},
  gerente:   {label:'Gerente',       color:'#2E7D32', bg:'#E8F5E9'},
  compras:   {label:'Compras',       color:'#E65100', bg:'#FFF3E0'},
  requisitante:{label:'Requisitante',color:'#424242', bg:'#F5F5F5'},
};
const SC={
  'Aguardando Diretoria':         'background:#E3F2FD;color:#0D47A1',
  'Reprovada':                    'background:#FFEBEE;color:#B71C1C',
  'Aguardando Orçamento':         'background:#FFF3E0;color:#E65100',
  'Aguardando Aprovação Diretoria':'background:#FFF8E1;color:#F57F17',
  'Aguardando Aprovação Gerente': 'background:#E8EAF6;color:#3949AB',
  'Aprovada':                     'background:#E8F5E9;color:#1B5E20',
  'Comprada':                     'background:#E0F2F1;color:#004D40',
  'Entregue':                     'background:#F5F5F5;color:#424242',
};
const UC={'Alta':'background:#FFEBEE;color:#C62828','Média':'background:#FFF3E0;color:#E65100','Baixa':'background:#E8F5E9;color:#2E7D32'};
const PTITLES={dashboard:'Dashboard',solicitacoes:'Solicitações',fornecedores:'Fornecedores',cotacoes:'Cotações',pedidos:'Pedidos & Entregas',relatorios:'Relatórios',usuarios:'Usuários'};

// ── UTILS ─────────────────────────────────────────────────────────────────
const fmt=v=>v==null?'—':new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v);
const fmtD=d=>d?new Date(d).toLocaleDateString('pt-BR'):'—';
const slug=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'.').replace(/[^a-z0-9.]/g,'');
const ini=(a,b)=>`${(a||'?')[0]}${(b||'?')[0]}`.toUpperCase();
const cs=s=>`<span class="chip" style="${SC[s]||'background:#eee;color:#666'}">${s||'—'}</span>`;
const cu=u=>`<span class="chip" style="${UC[u]||'background:#eee;color:#666'}">${u||'—'}</span>`;
const V=id=>document.getElementById(id)?.value||'';
const dr=(l,v)=>`<div class="dr"><span class="dl">${l}</span><span class="dv">${v||'—'}</span></div>`;

const isGestor=()=>S.user?.perfil==='gestor';
const isDiretoria=()=>['gestor','diretoria'].includes(S.user?.perfil);
const isGerente=()=>['gestor','gerente'].includes(S.user?.perfil);
const isCompras=()=>['gestor','compras'].includes(S.user?.perfil);
const pLabel=p=>PERFIS[p]?.label||p;
const pColor=p=>PERFIS[p]?.color||'#9E9E9E';
const pBg=p=>PERFIS[p]?.bg||'#F5F5F5';

// ── AUTH ──────────────────────────────────────────────────────────────────
async function doLogin(login,senha){
  const hash=await hashSenha(senha);
  const {data:u,error}=await sb.from('usuarios')
    .select('*')
    .eq('login',login.trim().toLowerCase())
    .single();
  if(error||!u)throw new Error('Usuário não encontrado. Verifique o login.');
  if(!u.ativo)throw new Error('Usuário desativado. Contate o gestor.');
  if(u.senha_hash!==hash)throw new Error('Senha incorreta. Tente novamente.');
  // Busca nome da loja separadamente se tiver loja
  if(u.loja_id){
    const {data:loja}=await sb.from('lojas').select('nome').eq('id',u.loja_id).single();
    u.loja={nome:loja?.nome||''};
  }
  S.user=u;
  localStorage.setItem(SESSION_KEY,JSON.stringify(u));
}

function doLogout(){
  S.user=null;
  localStorage.removeItem(SESSION_KEY);
  Object.assign(S,{page:'dashboard',sol:[],forn:[],cot:[],ped:[],users:[],modal:null});
  render();
}

function loadSession(){
  try{
    const saved=localStorage.getItem(SESSION_KEY);
    if(saved)S.user=JSON.parse(saved);
  }catch(e){localStorage.removeItem(SESSION_KEY);}
}

// ── DATA ──────────────────────────────────────────────────────────────────
async function loadLojas(){
  const {data}=await sb.from('lojas').select('*').eq('ativo',true).order('grupo').order('nome');
  S.lojas=data||[];
}
async function loadSol(){
  let q=sb.from('solicitacoes').select('*').order('data_criacao',{ascending:false});
  if(S.user?.perfil==='requisitante'){
    const nome=`${S.user.nome} ${S.user.sobrenome}`;
    q=q.eq('solicitante_nome',nome);
  } else if(S.user?.grupo&&S.user.grupo!=='TODOS'){
    q=q.eq('grupo',S.user.grupo);
  }
  const {data,error}=await q;
  if(error)console.error('loadSol error:',error);
  S.sol=data||[];
}
async function loadForn(){const {data}=await sb.from('fornecedores').select('*').order('nome');S.forn=data||[];}
async function loadCot(){const {data}=await sb.from('cotacoes').select('*').order('data_criacao',{ascending:false});S.cot=data||[];}
async function loadPed(){const {data}=await sb.from('pedidos').select('*').order('created_at',{ascending:false});S.ped=data||[];}
async function loadUsers(){const {data}=await sb.from('usuarios').select('*,loja:lojas(nome)').order('nome');S.users=data||[];}

async function loadPage(page){
  S.loading=true;render();
  try{
    if(!S.lojas.length)await loadLojas();
    if(['dashboard','solicitacoes','cotacoes','relatorios'].includes(page))await loadSol();
    if(['fornecedores','cotacoes','dashboard'].includes(page))await loadForn();
    if(page==='cotacoes'){await loadCot();if(!S.sol.length)await loadSol();}
    if(['pedidos','dashboard'].includes(page))await loadPed();
    if(page==='usuarios')await loadUsers();
  }catch(e){console.error(e);}
  S.loading=false;render();
}

// ── NUMBERS ───────────────────────────────────────────────────────────────
async function genNum(tipo,grupo){
  const tab={SOL:'solicitacoes',COT:'cotacoes',PED:'pedidos'}[tipo];
  const pref=tipo==='SOL'?(grupo==='BMMOT'?'BMM':'DHG'):tipo;
  const {count}=await sb.from(tab).select('*',{count:'exact',head:true});
  return `${pref}-${String((count||0)+1).padStart(4,'0')}`;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
async function criarSol(f){
  const loja=S.lojas.find(l=>l.id===f.loja_id);
  const num=await genNum('SOL',loja?.grupo||'DHG');
  const solNome=`${S.user.nome} ${S.user.sobrenome}`;
  const {error}=await sb.from('solicitacoes').insert({
    numero:num,loja_id:f.loja_id,loja_nome:loja?.nome,
    solicitante_nome:solNome,
    usuario_id:S.user.id,
    area:S.user.area||f.area,
    categoria:f.cat,descricao:f.desc,
    quantidade:parseInt(f.qtd)||1,
    valor_estimado:parseFloat(f.val)||null,
    urgencia:f.urg||'Baixa',
    justificativa:f.just,
    grupo:loja?.grupo,
    status:'Aguardando Diretoria'
  });
  if(error)throw new Error(error.message);
}

async function updateStatus(id,status,obs){
  const upd={status};
  if(obs)upd.observacoes=obs;
  if(status==='Aprovada')upd.data_aprovacao=new Date().toISOString();
  const {error}=await sb.from('solicitacoes').update(upd).eq('id',id);
  if(error)throw new Error(error.message);
}

async function salvarForn(id,f){
  const cats=f.cats?f.cats.split(',').map(c=>c.trim()).filter(Boolean):[];
  const obj={nome:f.nome,cnpj:f.cnpj,contato:f.contato,telefone:f.tel,email:f.email,categorias:cats,avaliacao:parseInt(f.av)||3,grupo:f.grupo||'TODOS'};
  if(id){obj.ativo=document.getElementById('ff-ativo')?.checked!==false;const{error}=await sb.from('fornecedores').update(obj).eq('id',id);if(error)throw new Error(error.message);}
  else{obj.ativo=true;const{error}=await sb.from('fornecedores').insert(obj);if(error)throw new Error(error.message);}
}

async function salvarCot(solId,itens){
  const num=await genNum('COT');
  const sol=S.sol.find(s=>s.id===solId);
  const criador=`${S.user.nome} ${S.user.sobrenome}`;
  const agora=new Date().toISOString();
  const {error}=await sb.from('cotacoes').insert({
    numero:num,solicitacao_id:solId,solicitacao_numero:sol?.numero,
    descricao:sol?.descricao?.slice(0,80),itens:JSON.stringify(itens),
    grupo:sol?.grupo,status:'Aberta',criado_por:criador
  });
  if(error)throw new Error(error.message);
  await sb.from('solicitacoes').update({
    status:'Aguardando Aprovação Diretoria',
    cotacao_por:criador,
    cotacao_data:agora
  }).eq('id',solId);
}

async function escolherVencedor(cotId,solId,forn,val){
  const num=await genNum('PED');
  const sol=S.sol.find(s=>s.id===solId);
  const cot=S.cot.find(c=>c.id===cotId);
  const prev=new Date();prev.setDate(prev.getDate()+7);
  const nome=`${S.user.nome} ${S.user.sobrenome}`;
  const agora=new Date().toISOString();
  await sb.from('cotacoes').update({status:'Encerrada',vencedor:forn}).eq('id',cotId);
  await sb.from('solicitacoes').update({status:'Comprada',valor_final:val,fornecedor:forn,comprado_por:nome,comprado_em:agora}).eq('id',solId);
  await sb.from('pedidos').insert({numero:num,solicitacao_id:solId,cotacao_id:cotId,solicitacao_numero:sol?.numero,fornecedor:forn,loja_nome:sol?.loja_nome,descricao:cot?.descricao,valor:val,data_compra:agora.slice(0,10),prev_entrega:prev.toISOString().slice(0,10),status:'Em Trânsito',grupo:sol?.grupo});
}

async function confirmarEntrega(pedId,solId,nf){
  const nome=`${S.user.nome} ${S.user.sobrenome}`;
  const agora=new Date().toISOString();
  await sb.from('pedidos').update({status:'Entregue',data_entrega:agora.slice(0,10),nf:nf||''}).eq('id',pedId);
  if(solId)await sb.from('solicitacoes').update({
    status:'Entregue',entregue_por:nome,entregue_em:agora
  }).eq('id',solId);
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){document.getElementById('root').innerHTML=S.user?buildApp():buildLogin();}
function goTo(p){S.page=p;S.modal=null;loadPage(p);}
function closeModal(){S.modal=null;render();}
function openModal(h){S.modal=h;render();}

// ── APP ───────────────────────────────────────────────────────────────────
function buildApp(){
  const u=S.user;
  const pD=S.sol.filter(s=>s.status==='Aguardando Diretoria').length;
  const pO=S.sol.filter(s=>s.status==='Aguardando Orçamento').length;
  const pAD=S.sol.filter(s=>s.status==='Aguardando Aprovação Diretoria').length;
  const pG=S.sol.filter(s=>s.status==='Aguardando Aprovação Gerente').length;
  const tot=(isDiretoria()?pD+pAD:0)+(isGerente()?pG:0)+(isCompras()?pO:0);

  const nav=[
    {id:'dashboard',icon:'📊',label:'Dashboard'},
    {id:'solicitacoes',icon:'🛒',label:'Solicitações',badge:tot},
    ...(isCompras()?[
      {id:'fornecedores',icon:'🏢',label:'Fornecedores'},
      {id:'cotacoes',icon:'📋',label:'Cotações',badge:pO},
      {id:'pedidos',icon:'🚚',label:'Pedidos'},
    ]:[]),
    ...(isDiretoria()||isGerente()||isGestor()?[{id:'relatorios',icon:'📈',label:'Relatórios'}]:[]),
    ...(isGestor()?[{id:'usuarios',icon:'👥',label:'Usuários'}]:[]),
  ];

  return `<div class="app">
  <div class="sb">
    <div class="sb-logo"><div class="sb-logo-t">Sistema de Compras</div><div class="sb-logo-s">DHG & BMMOT</div></div>
    <div class="sb-user">
      <div class="av" style="background:${pColor(u?.perfil)}">${ini(u?.nome,u?.sobrenome)}</div>
      <div style="min-width:0">
        <div class="sb-name">${u?.nome} ${u?.sobrenome}</div>
        <div class="sb-role">${pLabel(u?.perfil)}${u?.area?' · '+u.area:''}</div>
      </div>
    </div>
    <div class="sb-nav">
      ${nav.map(n=>`<div class="ni${S.page===n.id?' on':''}" onclick="goTo('${n.id}')">
        <span>${n.icon}</span><span>${n.label}</span>
        ${n.badge>0?`<span class="bdg">${n.badge}</span>`:''}
      </div>`).join('')}
    </div>
    <div class="sb-foot"><button class="btn-out" onclick="doLogout()">🚪 Sair</button></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-t">${PTITLES[S.page]||''}</div>
      <div class="topbar-d">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    </div>
    <div class="page">${S.loading?'<div style="text-align:center;padding:60px;color:#9E9E9E">Carregando...</div>':buildPage()}</div>
  </div>
  ${S.modal?`<div class="ov" onclick="if(event.target===this)closeModal()">${S.modal}</div>`:''}
</div>`;
}

function buildPage(){
  return({dashboard:pgDash,solicitacoes:pgSol,fornecedores:pgForn,cotacoes:pgCot,pedidos:pgPed,relatorios:pgRel,usuarios:pgUsers}[S.page]||pgDash)();
}

function buildTimeline(s){
  const status=typeof s==='string'?s:(s?.status||'');
  const obj=typeof s==='object'&&s!==null?s:null;
  const ORDER=[
    'Aguardando Diretoria',
    'Aguardando Orçamento',
    'Aguardando Aprovação Diretoria',
    'Aguardando Aprovação Gerente',
    'Aprovada',
    'Comprada',
    'Entregue'
  ];
  const steps=[
    {
      key:'Aguardando Diretoria',
      label:'Solicitação Aberta',
      icon:'📝',
      sub:obj?`${fmtD(obj.data_criacao)}${obj.solicitante_nome?'<br>'+obj.solicitante_nome.split(' ')[0]:''}`:''
    },
    {
      key:'Aguardando Orçamento',
      label:'Aprovação Diretoria',
      icon:'👔',
      sub:obj&&obj.aprovado_dir_nome?`${fmtD(obj.aprovado_dir_data)}<br>${obj.aprovado_dir_nome.split(' ')[0]}`:''
    },
    {
      key:'Aguardando Aprovação Diretoria',
      label:'Cotação Compras',
      icon:'📋',
      sub:obj&&obj.cotacao_por?`${fmtD(obj.cotacao_data)}<br>${obj.cotacao_por.split(' ')[0]}`:''
    },
    {
      key:'Aguardando Aprovação Gerente',
      label:'Aprovação Final',
      icon:'✅',
      sub:obj&&obj.aprovado_ger_nome
        ?`${fmtD(obj.aprovado_ger_data)}<br>Dir: ${(obj.aprovado_dir_nome||'').split(' ')[0]}<br>Ger: ${obj.aprovado_ger_nome.split(' ')[0]}`
        :obj&&obj.aprovado_dir_nome&&ORDER.indexOf(status)>=ORDER.indexOf('Aguardando Aprovação Gerente')
          ?`Dir: ${obj.aprovado_dir_nome.split(' ')[0]}`:''
    },
    {
      key:'Comprada',
      label:'Compra Realizada',
      icon:'🛒',
      sub:obj&&obj.comprado_por?`${fmtD(obj.comprado_em)}<br>${obj.comprado_por.split(' ')[0]}`:''
    },
    {
      key:'Entregue',
      label:'Entregue',
      icon:'📦',
      sub:obj&&obj.entregue_por?`${fmtD(obj.entregue_em)}<br>${obj.entregue_por.split(' ')[0]}`:''
    },
  ];

  const isReprovada=status==='Reprovada';
  const curIdx=ORDER.indexOf(status);

  return `<div style="display:flex;align-items:flex-start;overflow-x:auto;padding:6px 0 10px">
    ${steps.map((step,i)=>{
      const stepIdx=ORDER.indexOf(step.key);
      const done=!isReprovada&&curIdx>stepIdx;
      const active=!isReprovada&&curIdx===stepIdx;
      const clr=done||active?'#1565C0':'#E0E0E0';
      const bg=active?'#1565C0':done?'#E3F2FD':'#fff';
      const txtColor=active?'#1565C0':done?'#333':'#9E9E9E';
      return `
      ${i>0?`<div style="flex:1;height:2px;background:${clr};margin-top:17px;min-width:10px"></div>`:''}
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;min-width:76px;max-width:90px">
        <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid ${clr};background:${bg}">
          ${active?`<span style="color:#fff">${step.icon}</span>`
            :done?`<span style="color:#1565C0;font-weight:700;font-size:13px">✓</span>`
            :`<span style="color:#ccc">${step.icon}</span>`}
        </div>
        <div style="font-size:10px;font-weight:${active?'700':'400'};color:${txtColor};text-align:center;line-height:1.3">${step.label}</div>
        ${(done||active)&&step.sub?`<div style="font-size:10px;color:#1565C0;text-align:center;line-height:1.5;font-weight:500;margin-top:1px">${step.sub}</div>`:''}
      </div>`;
    }).join('')}
    ${isReprovada?`
    <div style="flex:1;height:2px;background:#FFEBEE;margin-top:17px;min-width:10px"></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;min-width:60px">
      <div style="width:36px;height:36px;border-radius:50%;background:#FFEBEE;border:2px solid #C62828;display:flex;align-items:center;justify-content:center;font-size:15px">❌</div>
      <div style="font-size:10px;font-weight:700;color:#C62828;text-align:center">Reprovada</div>
    </div>`:''}
  </div>`;
}


function pgDash(){
  const sol=S.sol,ped=S.ped;
  const total=sol.length,concl=sol.filter(s=>['Comprada','Entregue'].includes(s.status)).length;
  const valR=sol.reduce((a,b)=>a+(parseFloat(b.valor_final)||0),0);
  const transit=ped.filter(p=>p.status==='Em Trânsito').length;
  const sc={};sol.forEach(s=>{sc[s.status]=(sc[s.status]||0)+1;});
  const tl={};sol.forEach(s=>{if(s.loja_nome)tl[s.loja_nome]=(tl[s.loja_nome]||0)+1;});
  const tops=Object.entries(tl).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const mxL=tops[0]?.[1]||1;
  return `
<div class="kg">
  <div class="kpi"><div class="kl">Total Solicitações</div><div class="kv" style="color:#1565C0">${total}</div><div class="ks">${total-concl} em andamento</div></div>
  <div class="kpi"><div class="kl">Concluídas</div><div class="kv" style="color:#2E7D32">${concl}</div><div class="ks">compradas ou entregues</div></div>
  <div class="kpi"><div class="kl">Valor Realizado</div><div class="kv" style="color:#6A1B9A;font-size:18px">${fmt(valR)}</div><div class="ks">total comprado</div></div>
  <div class="kpi"><div class="kl">Em Trânsito</div><div class="kv" style="color:#E65100">${transit}</div><div class="ks">aguardando entrega</div></div>
</div>
<div class="g2">
  <div class="card" style="padding:18px">
    <div style="font-size:12px;font-weight:600;color:#9E9E9E;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px">Status das solicitações</div>
    ${Object.entries(sc).map(([s,n])=>`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">${cs(s)}<span style="font-weight:600;font-size:13px">${n}</span></div>`).join('')}
    ${!Object.keys(sc).length?'<div style="text-align:center;color:#ccc;padding:20px;font-size:13px">Nenhuma solicitação</div>':''}
  </div>
  <div class="card" style="padding:18px">
    <div style="font-size:12px;font-weight:600;color:#9E9E9E;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px">Lojas mais ativas</div>
    ${tops.map(([l,n])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${l}</span><span style="font-weight:600">${n}</span></div><div class="bw2"><div class="bf" style="width:${Math.round(n/mxL*100)}%"></div></div></div>`).join('')}
    ${!tops.length?'<div style="text-align:center;color:#ccc;padding:20px;font-size:13px">Sem dados</div>':''}
  </div>
</div>
<div class="card" style="padding:18px">
  <div style="font-size:12px;font-weight:600;color:#9E9E9E;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px">Últimas solicitações</div>
  ${sol.slice(0,5).map(s=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #F0F2F5">
    <div><div style="font-size:13px;font-weight:500">${s.numero} · ${s.loja_nome||'—'}</div>
    <div style="font-size:11px;color:#9E9E9E;margin-top:2px">${s.categoria} · ${s.area||'—'} · ${fmtD(s.data_criacao)}</div></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">${cu(s.urgencia)} ${cs(s.status)}</div>
  </div>`).join('')}
  ${!sol.length?'<div style="text-align:center;color:#ccc;padding:24px;font-size:13px">Nenhuma solicitação</div>':''}
</div>`;
}

// ── SOLICITAÇÕES ──────────────────────────────────────────────────────────
function pgSol(){
  const pD=S.sol.filter(s=>s.status==='Aguardando Diretoria').length;
  const pAD=S.sol.filter(s=>s.status==='Aguardando Aprovação Diretoria').length;
  const pG=S.sol.filter(s=>s.status==='Aguardando Aprovação Gerente').length;
  const pO=S.sol.filter(s=>s.status==='Aguardando Orçamento').length;
  return `
<div class="tb">
  <button class="btn bp" onclick="mdNovaSOL()">+ Nova Solicitação</button>
  ${isDiretoria()&&pD?`<span style="font-size:12px;background:#FFF3E0;color:#E65100;padding:6px 12px;border-radius:20px;font-weight:600">${pD} aguardando sua aprovação</span>`:''}
  ${isDiretoria()&&pAD?`<span style="font-size:12px;background:#FFF8E1;color:#F57F17;padding:6px 12px;border-radius:20px;font-weight:600">${pAD} orçamento para aprovar</span>`:''}
  ${isGerente()&&!isDiretoria()&&pG?`<span style="font-size:12px;background:#E8EAF6;color:#3949AB;padding:6px 12px;border-radius:20px;font-weight:600">${pG} aguardando sua aprovação final</span>`:''}
  ${isCompras()&&pO?`<span style="font-size:12px;background:#FFF3E0;color:#E65100;padding:6px 12px;border-radius:20px;font-weight:600">${pO} aguardando orçamento</span>`:''}
</div>
${!S.sol.length?`<div class="card" style="text-align:center;padding:48px;color:#ccc">
  <div style="font-size:40px;margin-bottom:12px">📋</div>
  <div style="font-size:15px;font-weight:500;margin-bottom:6px">Nenhuma solicitação</div>
  <div style="font-size:13px">Clique em "+ Nova Solicitação" para começar</div>
</div>`:`
<div style="display:grid;gap:14px">
  ${S.sol.map(s=>`
  <div class="card" style="padding:20px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <div>
        <div style="font-family:monospace;font-size:13px;font-weight:600;color:#1565C0">${s.numero}</div>
        <div style="font-size:15px;font-weight:600;color:#0F2236;margin-top:2px">${s.descricao.length>60?s.descricao.slice(0,60)+'...':s.descricao}</div>
        <div style="font-size:12px;color:#9E9E9E;margin-top:3px">${s.categoria} · ${s.loja_nome||'—'} · ${s.area||'—'} · Aberta em ${fmtD(s.data_criacao)}</div>
        ${s.solicitante_nome?`<div style="font-size:11px;color:#BDBDBD;margin-top:2px">Solicitante: ${s.solicitante_nome}</div>`:''}
        ${s.valor_estimado?`<div style="font-size:13px;font-weight:700;color:#1565C0;margin-top:5px">Valor estimado: ${fmt(s.valor_estimado)}</div>`:''}
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
        ${cu(s.urgencia)} ${cs(s.status)}
      </div>
    </div>
    ${buildTimeline(s)}
    ${s.status==='Reprovada'?`<div style="background:#FFEBEE;border-left:3px solid #C62828;border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:#B71C1C;margin-top:4px">❌ <strong>Reprovada.</strong>${s.observacoes?' Motivo: '+s.observacoes:''}</div>`:''}
    ${s.status==='Entregue'?`<div style="background:#E8F5E9;border-left:3px solid #2E7D32;border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:#1B5E20;margin-top:4px">✅ <strong>Entregue!</strong> Valor final: ${fmt(s.valor_final)}</div>`:''}
    ${s.fornecedor&&['Aprovada','Comprada','Entregue'].includes(s.status)?`<div style="background:#E3F2FD;border-left:3px solid #1565C0;border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:#0D47A1;margin-top:4px">🏢 <strong>Fornecedor escolhido:</strong> ${s.fornecedor} · ${fmt(s.valor_final)}</div>`:''}
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px;flex-wrap:wrap">
      <button class="sm bl" onclick="vSOL('${s.id}')">Ver detalhes</button>
      ${isDiretoria()&&s.status==='Aguardando Diretoria'?`<button class="sm ok" onclick="vSOL('${s.id}')">✓ Aprovar</button>`:''}
      ${isDiretoria()&&s.status==='Aguardando Aprovação Diretoria'?`<button class="sm ok" onclick="vSOL('${s.id}')">📋 Ver Orçamentos</button>`:''}
      ${isGerente()&&s.status==='Aguardando Aprovação Gerente'?`<button class="sm ok" onclick="vSOL('${s.id}')">✓ Aprovar Final</button>`:''}
      ${isCompras()&&s.status==='Aprovada'?`<button class="sm or" onclick="vSOL('${s.id}')">🛒 Executar Compra</button>`:''}
    </div>
  </div>`).join('')}
</div>`}`;
}

let itemCount=1;

function adicionarItem(){
  itemCount++;
  const tbody=document.getElementById('itens-tbody');
  if(!tbody)return;
  const n=itemCount;
  const tr=document.createElement('tr');
  tr.id='item-row-'+n;
  tr.innerHTML=`<td style="padding:6px 8px;color:#9E9E9E;font-size:12px">${n}</td>
    <td style="padding:3px 4px"><input class="inp item-desc" style="padding:7px 10px" placeholder="Descricao..."></td>
    <td style="padding:3px 4px"><input class="inp item-qtd" type="number" min="1" value="1" style="padding:7px 6px;text-align:center" oninput="calcTotal()"></td>
    <td style="padding:3px 4px"><input class="inp item-val" type="number" min="0" step="0.01" placeholder="0,00" style="padding:7px 6px;text-align:right" oninput="calcTotal()"></td>
    <td style="padding:6px 8px;text-align:right;font-weight:600;color:#1565C0" id="item-total-${n}">R$ 0,00</td>
    <td style="padding:3px 4px;text-align:center"><button onclick="removerItem('item-row-${n}')" style="background:#FFEBEE;border:none;color:#C62828;border-radius:6px;padding:5px 7px;cursor:pointer">X</button></td>`;
  tbody.appendChild(tr);
}

function removerItem(rowId){
  if(document.querySelectorAll('#itens-tbody tr').length<=1)return alert('Mantenha ao menos 1 item.');
  const r=document.getElementById(rowId);if(r)r.remove();calcTotal();
}

function calcTotal(){
  let total=0,count=0;
  document.querySelectorAll('#itens-tbody tr').forEach(tr=>{
    const qtd=parseFloat(tr.querySelector('.item-qtd')?.value)||0;
    const val=parseFloat(tr.querySelector('.item-val')?.value)||0;
    const sub=qtd*val;total+=sub;if(qtd>0)count++;
    const el=tr.querySelector('[id^="item-total-"]');
    if(el)el.textContent='R$ '+sub.toLocaleString('pt-BR',{minimumFractionDigits:2});
  });
  const ri=document.getElementById('resumo-itens');const rv=document.getElementById('resumo-valor');
  if(ri)ri.textContent=count;
  if(rv)rv.textContent='R$ '+total.toLocaleString('pt-BR',{minimumFractionDigits:2});
}

function showFiles(input){
  const list=document.getElementById('files-list');if(!list)return;list.innerHTML='';
  Array.from(input.files).forEach(f=>{
    const d=document.createElement('div');
    d.style.cssText='display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E0E0E0;border-radius:8px;padding:8px 12px;font-size:12px';
    d.innerHTML=`<span>${f.name.endsWith('.pdf')?'📄':'🖼️'}</span><span style="flex:1">${f.name}</span><span style="color:#9E9E9E">${(f.size/1024).toFixed(0)}KB</span>`;
    list.appendChild(d);
  });
}

function hDrop(e){
  e.preventDefault();
  const input=document.getElementById('sol-files');
  if(input&&e.dataTransfer.files.length){Object.defineProperty(input,'files',{value:e.dataTransfer.files});showFiles(input);}
}

async function hCriarSOL(){
  const loja_id=V('sl'),area=V('sa'),tipo=V('sti'),cat=V('sc'),urg=V('su'),just=V('sj'),data_est=V('sdt');
  if(!loja_id)return alert('Selecione a loja.');
  if(!just.trim())return alert('Preencha a justificativa.');
  const itens=[];let valorTotal=0;
  document.querySelectorAll('#itens-tbody tr').forEach(tr=>{
    const desc=tr.querySelector('.item-desc')?.value?.trim();
    const qtd=parseFloat(tr.querySelector('.item-qtd')?.value)||0;
    const val=parseFloat(tr.querySelector('.item-val')?.value)||0;
    if(desc){itens.push({desc,qtd,val,total:qtd*val});valorTotal+=qtd*val;}
  });
  if(!itens.length)return alert('Adicione ao menos 1 item com descricao.');
  const files=document.getElementById('sol-files')?.files;
  const fileNames=files&&files.length?Array.from(files).map(f=>f.name).join(', '):'';
  const loja=S.lojas.find(l=>l.id===loja_id);
  const num=await genNum('SOL',loja?.grupo||'DHG');
  const descricao=itens.map(i=>i.qtd+'x '+i.desc).join(' | ').slice(0,200);
  const {error}=await sb.from('solicitacoes').insert({
    numero:num,loja_id,loja_nome:loja?.nome,
    solicitante_nome:`${S.user.nome} ${S.user.sobrenome}`,
    usuario_id:S.user.id,area,
    tipo_compra:tipo,categoria:cat,urgencia:urg,
    descricao,justificativa:just,
    quantidade:itens.reduce((a,b)=>a+b.qtd,0),
    valor_estimado:valorTotal,
    data_estimada:data_est||null,
    itens_requisicao:itens,
    anexos:fileNames||null,
    grupo:loja?.grupo,status:'Aguardando Diretoria'
  });
  if(error)return alert('Erro: '+error.message);
  closeModal();await loadSol();render();
  alert('Requisicao '+num+' enviada! Itens: '+itens.length+' - Total: R$ '+valorTotal.toLocaleString('pt-BR',{minimumFractionDigits:2}));
}

async function hSt(id,status){
  const obs=V('ov');
  const nome=`${S.user.nome} ${S.user.sobrenome}`;
  const agora=new Date().toISOString();
  try{
    const upd={status};
    if(obs)upd.observacoes=obs;
    // Auditoria por etapa
    if(status==='Aguardando Orçamento'){
      upd.aprovado_dir_nome=nome;
      upd.aprovado_dir_data=agora;
    }
    if(status==='Aprovada'){
      upd.aprovado_ger_nome=nome;
      upd.aprovado_ger_data=agora;
      upd.data_aprovacao=agora;
    }
    if(status==='Reprovada'){
      upd.aprovado_ger_nome=nome;
      upd.aprovado_ger_data=agora;
    }
    await sb.from('solicitacoes').update(upd).eq('id',id);
    closeModal();await loadSol();render();
  }catch(e){alert(e.message);}
}

async function hEscolherForn(cotId,solId,forn,val){
  if(!confirm('Confirma escolha de '+forn+' por '+fmt(val)+'?'))return;
  const obs=V('ov');
  const nome=`${S.user.nome} ${S.user.sobrenome}`;
  const agora=new Date().toISOString();
  try{
    if(cotId)await sb.from('cotacoes').update({vencedor:forn,status:'Encerrada'}).eq('id',cotId);
    const upd={
      status:'Aguardando Aprovação Gerente',
      fornecedor:forn,valor_final:val,
      aprovado_dir_nome:nome,
      aprovado_dir_data:agora
    };
    if(obs)upd.observacoes=obs;
    await sb.from('solicitacoes').update(upd).eq('id',solId);
    closeModal();await loadSol();await loadCot();render();
    alert('✅ '+forn+' escolhido! Enviado para aprovação do Gerente.');
  }catch(e){alert(e.message);}
}

function loadItensCot(solId){
  const sel=document.getElementById('cot-sol');
  const opt=sel?.querySelector(`option[value="${solId}"]`);
  if(!opt)return;
  let itens=[];
  try{itens=JSON.parse(opt.dataset.itens||'[]');}catch(e){itens=[];}

  // If no itens_requisicao, create a single generic item from descricao
  if(!itens.length){
    const sol=S.sol.find(s=>s.id===solId);
    if(sol)itens=[{desc:sol.descricao,qtd:sol.quantidade||1,val:0,total:0}];
  }

  const block=document.getElementById('cot-fornecedores');
  if(block)block.style.display='block';

  [1,2,3].forEach(n=>{
    const tbody=document.getElementById(`cf${n}-itens`);
    if(!tbody)return;
    tbody.innerHTML=itens.map((item,idx)=>`
      <tr style="border-bottom:1px solid #F0F2F5">
        <td style="padding:8px 10px;color:#9E9E9E;font-size:11px;text-align:center">${idx+1}</td>
        <td style="padding:8px 10px;font-size:12px">${item.desc||item.descricao||'—'}</td>
        <td style="padding:8px 10px;text-align:center;font-weight:600">${item.qtd||1}</td>
        <td style="padding:4px 6px">
          <input type="number" min="0" step="0.01" placeholder="0,00"
            style="width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;text-align:right"
            data-qtd="${item.qtd||1}" data-idx="${idx}"
            oninput="calcTotalForn(${n})"
            class="cf${n}-vunit">
        </td>
        <td style="padding:8px 10px;text-align:right;font-weight:600;color:#1565C0;font-size:12px" id="cf${n}-row${idx}-total">R$ 0,00</td>
      </tr>`).join('');
  });
}

function calcTotalForn(n){
  let total=0;
  document.querySelectorAll(`.cf${n}-vunit`).forEach(inp=>{
    const qtd=parseFloat(inp.dataset.qtd)||1;
    const vunit=parseFloat(inp.value)||0;
    const sub=qtd*vunit;
    total+=sub;
    const idx=inp.dataset.idx;
    const el=document.getElementById(`cf${n}-row${idx}-total`);
    if(el)el.textContent='R$ '+sub.toLocaleString('pt-BR',{minimumFractionDigits:2});
  });
  const el=document.getElementById(`cf${n}-total`);
  if(el)el.textContent='R$ '+total.toLocaleString('pt-BR',{minimumFractionDigits:2});
}

async function hCot(){
  const solId=document.getElementById('cot-sol')?.value;
  if(!solId)return alert('Selecione uma solicitação.');
  const sel=document.getElementById('cot-sol');
  const opt=sel?.querySelector(`option[value="${solId}"]`);
  let solItens=[];
  try{solItens=JSON.parse(opt?.dataset?.itens||'[]');}catch(e){solItens=[];}

  const it=[];
  for(let n=1;n<=3;n++){
    const nome=document.getElementById(`cf${n}-nome`)?.value?.trim();
    if(!nome)continue;
    const cnpj=document.getElementById(`cf${n}-cnpj`)?.value?.trim();
    const data=document.getElementById(`cf${n}-data`)?.value||'';
    const valid=document.getElementById(`cf${n}-valid`)?.value||'';
    const pgto=document.getElementById(`cf${n}-pgto`)?.value||'';
    const obs=document.getElementById(`cf${n}-obs`)?.value||'';
    // Collect item prices
    const itensForn=[];
    let valTotal=0;
    document.querySelectorAll(`.cf${n}-vunit`).forEach((inp,idx)=>{
      const item=solItens[idx]||{};
      const qtd=parseFloat(inp.dataset.qtd)||1;
      const vunit=parseFloat(inp.value)||0;
      const total=qtd*vunit;
      valTotal+=total;
      itensForn.push({desc:item.desc||item.descricao||'Item '+(idx+1),qtd,vunit,total});
    });
    const fileInput=document.getElementById(`cf${n}-file`);
    const arquivo=fileInput?.files?.[0]?.name||'';
    it.push({forn:nome,cnpj,val:valTotal,prazo:0,pgto,obs,data,validade:valid,itens:itensForn,arquivo});
  }

  if(it.length<2)return alert('Preencha ao menos 2 fornecedores para continuar.');
  if(it.some(i=>i.val<=0))return alert('Preencha os valores unitários de todos os itens.');
  try{
    await salvarCot(solId,it);
    closeModal();
    await loadCot();
    await loadSol();
    render();
    alert(`✅ ${it.length} orçamentos enviados para aprovação da Diretoria!`);
  }catch(e){alert(e.message);}
}

async function salvarFornOrc2(n){
  const nome=document.getElementById(`cf${n}-nome`)?.value?.trim();
  const cnpj=document.getElementById(`cf${n}-cnpj`)?.value?.trim();
  if(!nome)return alert('Preencha o nome do fornecedor antes de salvar.');
  if(cnpj){
    const cnpjLimpo=cnpj.replace(/\D/g,'');
    const {data:exist}=await sb.from('fornecedores').select('id,nome').ilike('cnpj','%'+cnpjLimpo.slice(0,8)+'%');
    if(exist&&exist.length>0)return alert(`CNPJ já cadastrado para: "${exist[0].nome}"`);
  }
  if(!confirm(`Salvar "${nome}" no cadastro de fornecedores?`))return;
  try{
    const {error}=await sb.from('fornecedores').insert({nome,cnpj:cnpj||'',contato:'',telefone:'',email:'',categorias:[],avaliacao:3,grupo:'TODOS',ativo:true});
    if(error){
      if(error.message.includes('unique'))return alert(`Fornecedor "${nome}" já cadastrado.`);
      throw new Error(error.message);
    }
    alert(`✅ "${nome}" salvo! Complete os dados em Fornecedores.`);
    await loadForn();
  }catch(e){alert('Erro: '+e.message);}
}


async function salvarFornOrc(n){
  const nome=document.getElementById(`ot${n}-forn`)?.value?.trim();
  const cnpj=document.getElementById(`ot${n}-cnpj`)?.value?.trim();
  if(!nome)return alert('Preencha o nome do fornecedor antes de salvar.');
  // Verifica duplicata por nome
  const {data:existNome}=await sb.from('fornecedores').select('id,nome').ilike('nome',nome);
  if(existNome&&existNome.length>0){
    return alert(`⚠️ Fornecedor "${existNome[0].nome}" já está cadastrado no sistema.\nNão é possível duplicar.`);
  }
  // Verifica duplicata por CNPJ
  if(cnpj){
    const cnpjLimpo=cnpj.replace(/\D/g,'');
    if(cnpjLimpo.length>=8){
      const {data:existCnpj}=await sb.from('fornecedores').select('id,nome').ilike('cnpj','%'+cnpjLimpo.slice(0,8)+'%');
      if(existCnpj&&existCnpj.length>0){
        return alert(`⚠️ CNPJ já cadastrado para o fornecedor: "${existCnpj[0].nome}".\nNão é possível duplicar.`);
      }
    }
  }
  if(confirm(`Salvar "${nome}" no cadastro de fornecedores?`)){
    try{
      const {error}=await sb.from('fornecedores').insert({
        nome,cnpj:cnpj||'',contato:'',telefone:'',email:'',
        categorias:[],avaliacao:3,grupo:'TODOS',ativo:true
      });
      if(error){
        if(error.message.includes('unique'))return alert(`Fornecedor "${nome}" já está cadastrado no sistema.`);
        throw new Error(error.message);
      }
      alert(`✅ Fornecedor "${nome}" salvo!\nComplete os dados em Fornecedores.`);
      await loadForn();
    }catch(e){alert('Erro: '+e.message);}
  }
}

function fmtCNPJ(el){
  let v=el.value.replace(/\D/g,'').slice(0,14);
  if(v.length>12)v=v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
  else if(v.length>8)v=v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})/,'$1.$2.$3/$4');
  else if(v.length>5)v=v.replace(/(\d{2})(\d{3})(\d{3})/,'$1.$2.$3');
  else if(v.length>2)v=v.replace(/(\d{2})(\d{3})/,'$1.$2');
  el.value=v;
}

function calcMelhor(){
  const vals=[1,2,3].map(n=>{
    const forn=document.getElementById(`ot${n}-forn`)?.value;
    const val=parseFloat(document.getElementById(`ot${n}-val`)?.value);
    return forn&&val>0?{forn,val}:null;
  }).filter(Boolean);
  const el=document.getElementById('melhor-preco');
  const txt=document.getElementById('melhor-txt');
  if(vals.length>=2){
    const best=vals.reduce((a,b)=>a.val<b.val?a:b);
    if(el)el.style.display='block';
    if(txt)txt.textContent=`${best.forn} — ${fmt(best.val)}`;
  } else {
    if(el)el.style.display='none';
  }
}

function mdEnt(pedId,solId){
  openModal(`<div class="modal" style="max-width:400px">
  <div class="mh"><span>Confirmar Entrega</span><button class="xb" onclick="closeModal()">✕</button></div>
  <div class="mb">
    <div class="f"><label>Número da Nota Fiscal</label><input class="inp" id="nf" placeholder="NF-0000 (opcional)"></div>
    <p style="font-size:13px;color:#555;line-height:1.6">Confirma que o item foi recebido e está em conformidade?</p>
  </div>
  <div class="mf"><button class="btn bsc" onclick="closeModal()">Cancelar</button><button class="btn bs" onclick="hEnt('${pedId}','${solId}')">✓ Confirmar</button></div>
  </div>`);
}
async function hEnt(pedId,solId){
  try{await confirmarEntrega(pedId,solId||null,V('nf'));closeModal();await loadPed();await loadSol();render();}
  catch(e){alert(e.message);}
}

// ── RELATÓRIOS ────────────────────────────────────────────────────────────
function pgRel(){
  const sol=S.sol;
  const tE=sol.reduce((a,b)=>a+(parseFloat(b.valor_estimado)||0),0);
  const tR=sol.filter(s=>s.valor_final).reduce((a,b)=>a+(parseFloat(b.valor_final)||0),0);
  const cats={};sol.forEach(s=>{cats[s.categoria]=(cats[s.categoria]||0)+(parseFloat(s.valor_estimado)||0);});
  const cA=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const mxC=cA[0]?.[1]||1;
  const lojas=[...new Set(sol.map(s=>s.loja_nome))].filter(Boolean);
  return `
<div class="kg" style="grid-template-columns:repeat(3,1fr)">
  <div class="kpi"><div class="kl">Total Orçado</div><div class="kv" style="color:#1565C0;font-size:18px">${fmt(tE)}</div></div>
  <div class="kpi"><div class="kl">Total Realizado</div><div class="kv" style="color:#2E7D32;font-size:18px">${fmt(tR)}</div></div>
  <div class="kpi"><div class="kl">Economia Gerada</div><div class="kv" style="color:#6A1B9A;font-size:18px">${fmt(tE-tR)}</div></div>
</div>
<div class="card" style="padding:18px;margin-bottom:16px">
  <div style="font-size:12px;font-weight:600;color:#9E9E9E;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px">Gasto por categoria</div>
  ${cA.slice(0,7).map(([c,v])=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${c}</span><span style="font-weight:600">${fmt(v)}</span></div><div class="bw2"><div class="bf" style="width:${Math.round(v/mxC*100)}%"></div></div></div>`).join('')}
  ${!cA.length?'<div style="text-align:center;color:#ccc;padding:20px">Sem dados</div>':''}
</div>
<div class="card">
  <div style="padding:16px 18px;border-bottom:1px solid #F0F2F5;font-size:12px;font-weight:600;color:#9E9E9E;text-transform:uppercase;letter-spacing:.05em">Por loja</div>
  <div class="tw"><table>
  <thead><tr><th>Loja</th><th>Grupo</th><th>Sol.</th><th>Orçado</th><th>Realizado</th><th>Taxa Aprov.</th></tr></thead>
  <tbody>${lojas.map(l=>{
    const ls=sol.filter(s=>s.loja_nome===l);
    const ap=ls.filter(s=>['Aprovada','Comprada','Entregue'].includes(s.status)).length;
    const vE=ls.reduce((a,b)=>a+(parseFloat(b.valor_estimado)||0),0);
    const vR=ls.filter(s=>s.valor_final).reduce((a,b)=>a+(parseFloat(b.valor_final)||0),0);
    return `<tr><td style="font-weight:500">${l}</td><td>${ls[0]?.grupo||'—'}</td><td>${ls.length}</td><td>${fmt(vE)}</td><td>${vR?fmt(vR):'—'}</td><td><span class="chip" style="background:#E8F5E9;color:#2E7D32">${ls.length?Math.round(ap/ls.length*100):0}%</span></td></tr>`;
  }).join('')}
  ${!lojas.length?`<tr><td colspan="6" style="text-align:center;padding:40px;color:#ccc">Sem dados</td></tr>`:''}
  </tbody></table></div>
</div>`;
}

// ── USUÁRIOS ──────────────────────────────────────────────────────────────

  const lo=S.lojas.map(l=>`<option value="${l.id}">${l.nome} (${l.grupo})</option>`).join('');
  openModal(`<div class="modal" style="max-width:520px">
  <div class="mh"><span>➕ Criar Novo Usuário</span><button class="xb" onclick="closeModal()">✕</button></div>
  <div class="mb">
    <div id="ue" class="eb"></div>
    <div class="ib ibl">O login é gerado como <strong>nome.sobrenome</strong>. Você define a senha inicial.</div>
    <div class="fg2">
      <div class="f"><label>Nome *</label><input class="inp" id="un" placeholder="João" oninput="prevL()"></div>
      <div class="f"><label>Sobrenome *</label><input class="inp" id="uss" placeholder="Silva" oninput="prevL()"></div>

        <option value="gerente">Gerente — aprovação final</option>
        <option value="compras">Compras — gerencia orçamentos</option>
        <option value="gestor">Gestor — acesso total</option>
      </select></div>
      <div class="f"><label>Área</label><select class="inp" id="uar">${AREAS.map(a=>`<option>${a}</option>`).join('')}</select></div>
    </div>
    <div class="fg2">
      <div class="f"><label>Grupo</label><select class="inp" id="ugr">
        <option value="TODOS">Todos os grupos</option>
        <option value="DHG">Grupo DHG</option>
        <option value="BMMOT">Grupo BMMOT</option>
      </select></div>
      <div class="f"><label>Loja</label><select class="inp" id="ulo"><option value="">— Nenhuma —</option>${lo}</select></div>
    </div>
    <hr class="hdiv">
    <div class="fg2">
      <div class="f"><label>Senha inicial *</label><input class="inp" id="use" type="password" placeholder="Mínimo 6 caracteres"></div>
      <div class="f"><label>Confirmar senha *</label><input class="inp" id="use2" type="password" placeholder="Repita a senha"></div>
    </div>
  </div>
  <div class="mf">
    <button class="btn bsc" onclick="closeModal()">Cancelar</button>
    <button class="btn bp" id="btn-criar" onclick="hCriarUser()">Criar Usuário</button>
  </div>
  </div>`);
}

function prevL(){
  const n=V('un'),s=V('uss'),el=document.getElementById('ulp');
  if(!el)return;
  const l=slug(`${n} ${s}`);
  el.textContent=l.length>2?`Login: ${l}`:'Login: será gerado automaticamente';
}

async function hCriarUser(){
  const nome=V('un'),sob=V('uss'),perfil=V('upr'),area=V('uar'),grupo=V('ugr'),loja=V('ulo'),senha=V('use'),senha2=V('use2');
  const err=document.getElementById('ue');
  const showErr=m=>{if(err){err.style.display='block';err.textContent=m;}};
  if(err)err.style.display='none';
  if(!nome||!sob){showErr('Preencha nome e sobrenome.');return;}
  if(!senha||senha.length<6){showErr('Senha deve ter mínimo 6 caracteres.');return;}
  if(senha!==senha2){showErr('As senhas não coincidem.');return;}
  const login=slug(`${nome} ${sob}`);
  if(!login||login.length<3){showErr('Nome inválido para gerar login.');return;}
  const btn=document.getElementById('btn-criar');
  if(btn){btn.textContent='Criando...';btn.disabled=true;}
  try{
    const hash=await hashSenha(senha);
    const {error}=await sb.from('usuarios').insert({
      nome,sobrenome:sob,login,senha_hash:hash,
      perfil,area,grupo,
      loja_id:loja||null,ativo:true
    });
    if(error){
      if(error.message.includes('unique'))throw new Error(`Login "${login}" já existe. Tente um nome diferente.`);
      throw new Error(error.message);
    }
    closeModal();await loadUsers();render();
    alert(`✅ Usuário criado!\n\nLogin: ${login}\nSenha: a que você definiu\n\nCompartilhe com ${nome}.`);
  }catch(e){
    showErr(e.message);
    if(btn){btn.textContent='Criar Usuário';btn.disabled=false;}
  }
}

function mdSenha(id,nome){
  openModal(`<div class="modal" style="max-width:420px">
  <div class="mh"><span>🔑 Redefinir Senha — ${nome}</span><button class="xb" onclick="closeModal()">✕</button></div>
  <div class="mb">
    <div class="fg2">
      <div class="f"><label>Nova Senha *</label><input class="inp" id="ns1" type="password" placeholder="Mínimo 6 caracteres"></div>
      <div class="f"><label>Confirmar *</label><input class="inp" id="ns2" type="password" placeholder="Repita a senha"></div>
    </div>
  </div>
  <div class="mf"><button class="btn bsc" onclick="closeModal()">Cancelar</button><button class="btn bp" onclick="hSenha('${id}')">Salvar Nova Senha</button></div>
  </div>`);
}

async function hSenha(id){
  const s1=V('ns1'),s2=V('ns2');
  if(!s1||s1.length<6)return alert('Senha deve ter mínimo 6 caracteres.');
  if(s1!==s2)return alert('As senhas não coincidem.');
  try{
    const hash=await hashSenha(s1);
    const {error}=await sb.from('usuarios').update({senha_hash:hash}).eq('id',id);
    if(error)throw new Error(error.message);
    closeModal();alert('✅ Senha redefinida com sucesso!');
  }catch(e){alert(e.message);}
}

async function hToggle(id,ativo){
  if(!confirm(`Deseja ${ativo?'ativar':'desativar'} este usuário?`))return;
  try{
    const {error}=await sb.from('usuarios').update({ativo}).eq('id',id);
    if(error)throw new Error(error.message);
    await loadUsers();render();
  }catch(e){alert(e.message);}
}

function mdEditUser(id){
  const u=S.users.find(x=>x.id===id);if(!u)return;
  const lo=S.lojas.map(l=>`<option value="${l.id}"${u.loja_id===l.id?' selected':''}>${l.nome}</option>`).join('');
  openModal(`<div class="modal" style="max-width:480px">
  <div class="mh"><span>✏️ Editar — ${u.nome} ${u.sobrenome}</span><button class="xb" onclick="closeModal()">✕</button></div>
  <div class="mb">
    <div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:10px 14px;margin-bottom:16px">
      <div style="font-size:11px;color:#1e40af;margin-bottom:2px">Login (não pode ser alterado)</div>
      <div style="font-family:monospace;font-size:15px;font-weight:600;color:#1565C0">${u.login}</div>
    </div>
    <div class="fg2">
      <div class="f"><label>Perfil</label><select class="inp" id="ep">
        <option value="requisitante"${u.perfil==='requisitante'?' selected':''}>Requisitante</option>
        <option value="diretoria"${u.perfil==='diretoria'?' selected':''}>Diretoria</option>
        <option value="gerente"${u.perfil==='gerente'?' selected':''}>Gerente</option>
        <option value="compras"${u.perfil==='compras'?' selected':''}>Compras</option>
        <option value="gestor"${u.perfil==='gestor'?' selected':''}>Gestor</option>
      </select></div>
      <div class="f"><label>Área</label><select class="inp" id="ea">${AREAS.map(a=>`<option${u.area===a?' selected':''}>${a}</option>`).join('')}</select></div>
    </div>
    <div class="fg2">
      <div class="f"><label>Grupo</label><select class="inp" id="eg">
        <option value="TODOS"${u.grupo==='TODOS'?' selected':''}>Todos</option>
        <option value="DHG"${u.grupo==='DHG'?' selected':''}>DHG</option>
        <option value="BMMOT"${u.grupo==='BMMOT'?' selected':''}>BMMOT</option>
      </select></div>
      <div class="f"><label>Loja</label><select class="inp" id="el"><option value="">— Nenhuma —</option>${lo}</select></div>
    </div>
  </div>
  <div class="mf"><button class="btn bsc" onclick="closeModal()">Cancelar</button><button class="btn bp" onclick="hEditUser('${u.id}')">Salvar</button></div>
  </div>`);
}

async function hEditUser(id){
  const perfil=V('ep'),grupo=V('eg'),loja_id=V('el')||null,area=V('ea');
  try{
    const {error}=await sb.from('usuarios').update({perfil,grupo,loja_id,area}).eq('id',id);
    if(error)throw new Error(error.message);
    closeModal();await loadUsers();render();
  }catch(e){alert(e.message);}
}

// ── LOGIN HANDLER ─────────────────────────────────────────────────────────
async function hLogin(){
  const login=V('ll'),senha=V('ls');
  const err=document.getElementById('le');
  if(!login||!senha){if(err){err.style.display='block';err.textContent='Preencha login e senha.';}return;}
  if(err)err.style.display='none';
  const btn=document.querySelector('[onclick="hLogin()"]');
  if(btn){btn.textContent='Entrando...';btn.disabled=true;}
  try{
    await doLogin(login,senha);
    await loadPage('dashboard');
  }catch(e){
    if(err){err.style.display='block';err.textContent=e.message;}
    if(btn){btn.textContent='Entrar →';btn.disabled=false;}
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────
async function init(){
  loadSession();
  try{await loadLojas();}catch(e){}
  if(S.user)await loadPage('dashboard');
  else render();
}

document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('ls'))hLogin();});
init();
</script>
</body>
</html>
