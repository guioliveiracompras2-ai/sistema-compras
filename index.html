// ── CONTROLE DE ACESSO POR GRUPO E LOJA ─────────────────────────────────
function userGrupos(){
  const g=S.user?.grupos;
  if(!g||!g.length||g.includes('TODOS'))return['DHG','BMMOT','UNIC'];
  return g;
}
function userLojas(){
  const l=S.user?.lojas_acesso;
  if(!l||!l.length||l.includes('TODOS'))return['TODOS'];
  return l;
}
function podeVerGrupo(grupo){
  if(isGestor())return true;
  const g=grupo==='DHC'?'DHG':grupo;
  return userGrupos().includes(g)||userGrupos().includes('TODOS');
}
function podeVerLoja(lojaId){
  if(isGestor())return true;
  const lojas=userLojas();
  if(lojas.includes('TODOS'))return true;
  return lojas.includes(lojaId);
}
function filtrarPorAcesso(lista){
  if(!lista||!lista.length)return lista||[];
  // Gestor vê tudo
  if(isGestor())return lista;
  const grps=userGrupos();
  const lojas=userLojas();
  const todosGrps=grps.includes('TODOS');
  const todasLojas=lojas.includes('TODOS');
  return lista.filter(s=>{
    const grpRaw=s.grupo||(
      (s.numero||s.solicitacao_numero||'').startsWith('BMM')?'BMMOT':
      (s.numero||s.solicitacao_numero||'').startsWith('RC')?'UNIC':'DHG'
    );
    // DHC e DHG são o mesmo grupo
    const grp=grpRaw==='DHC'?'DHG':grpRaw;
    if(!todosGrps&&!grps.includes(grp))return false;
    if(todasLojas)return true;
    return lojas.includes(s.loja_id)||lojas.includes(s.loja_nome);
  });
}

function getLojaDados(nomeOuId){
  if(!nomeOuId)return {cnpj:'',end:'',num:'',cep:'',cidade:'Bauru',uf:'SP',grupo:''};
  const n=(nomeOuId||'').toLowerCase().trim();
  // Busca exata primeiro
  if(LOJAS_INFO[n])return LOJAS_INFO[n];
  // Busca parcial: chave contida no nome OU nome contido na chave
  const key=Object.keys(LOJAS_INFO).find(k=>n.includes(k)||k.includes(n.substring(0,8)));
  if(key)return LOJAS_INFO[key];
  // Tenta pelo objeto loja do Supabase com cnpj/endereço já preenchido
  const loja=S.lojas.find(l=>l.id===nomeOuId||l.nome===nomeOuId||(l.nome||'').toLowerCase()===n);
  if(loja&&loja.cnpj)return {cnpj:loja.cnpj||'',end:loja.endereco||'',num:loja.numero||'',cep:loja.cep||'',cidade:loja.cidade||'Bauru',uf:loja.uf||'SP',grupo:loja.grupo||''};
  if(loja)return {cnpj:'',end:'',num:'',cep:'',cidade:'Bauru',uf:'SP',grupo:loja.grupo||''};
  return {cnpj:'',end:'',num:'',cep:'',cidade:'Bauru',uf:'SP',grupo:''};
}

// ── HASH ──────────────────────────────────────────────────────────────────
async function hashSenha(senha){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(senha));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── AUTH ──────────────────────────────────────────────────────────────────
async function doLogin(login,senha){
  const hash=await hashSenha(senha);
  const {data:u,error}=await sb.from('usuarios')
    .select('*')
    .eq('login',login.trim().toLowerCase())
    .single();
  if(error||!u)throw new Error('Usuário não encontrado. Verifique o login.');
  if(!u.ativo)throw new Error('Usuário desativado. Contate o gestor.');
  if(u.senha_hash!==hash)throw new Error('Senha incorreta. Tente novamente.');
  if(u.loja_id){
    const {data:loja}=await sb.from('lojas').select('nome').eq('id',u.loja_id).single();
    u.loja={nome:loja?.nome||''};
  }
  S.user=u;
  salvarSessao(u);
}

function salvarSessao(u){
  const sessao={
    user:u,
    expira:Date.now()+(30*24*60*60*1000) // 30 dias
  };
  try{
    localStorage.setItem(SESSION_KEY,JSON.stringify(sessao));
    // Backup no sessionStorage para mobile
    sessionStorage.setItem(SESSION_KEY,JSON.stringify(sessao));
  }catch(e){}
}

function doLogout(){
  S.user=null;
  try{localStorage.removeItem(SESSION_KEY);}catch(e){}
  try{sessionStorage.removeItem(SESSION_KEY);}catch(e){}
  Object.assign(S,{page:'dashboard',sol:[],forn:[],cot:[],ped:[],users:[],modal:null});
  render();
}

function loadSession(){
  try{
    // Tenta localStorage primeiro, depois sessionStorage como fallback
    const raw=localStorage.getItem(SESSION_KEY)||sessionStorage.getItem(SESSION_KEY);
    if(!raw)return;
    const dados=JSON.parse(raw);

    // Suporte ao formato antigo (sem expiry)
    const u=dados.user||dados;
    const expira=dados.expira||Date.now()+(30*24*60*60*1000);

    // Verifica expiração
    if(Date.now()>expira){
      localStorage.removeItem(SESSION_KEY);
      sessionStorage.removeItem(SESSION_KEY);
      S.user=null;
      return;
    }

    // Valida campos mínimos (compatível com sessões antigas sem id)
    if(u&&u.login&&u.perfil){
      S.user=u;
      // Renova sessão por mais 30 dias a cada login
      salvarSessao(u);
    } else {
      localStorage.removeItem(SESSION_KEY);
      sessionStorage.removeItem(SESSION_KEY);
      S.user=null;
    }
  }catch(e){
    try{localStorage.removeItem(SESSION_KEY);}catch(err){}
    S.user=null;
  }
}

// ── DATA ──────────────────────────────────────────────────────────────────
async function loadLojas(){
  const {data}=await sb.from('lojas').select('*').eq('ativo',true).order('grupo').order('nome');
  S.lojas=data||[];
}
async function loadSol(){
  let q=sb.from('solicitacoes').select('*').order('data_criacao',{ascending:false});
  if(S.user?.perfil==='requisitante'){
    const nome=`${S.user.nome} ${S.user.sobrenome}`;
    q=q.eq('solicitante_nome',nome);
  } else if(S.user?.grupo&&S.user.grupo!=='TODOS'){
    q=q.eq('grupo',S.user.grupo);
  }
  const {data,error}=await q;
  if(error)console.error('loadSol error:',error);
  S.sol=data||[];
}
async function loadForn(){const {data}=await sb.from('fornecedores').select('*').order('nome');S.forn=data||[];}
async function loadCot(){const {data}=await sb.from('cotacoes').select('*').order('data_criacao',{ascending:false});S.cot=data||[];}
async function loadPed(){const {data}=await sb.from('pedidos').select('*').order('created_at',{ascending:false});S.ped=data||[];}
async function loadUsers(){
  const {data,error}=await sb.from('usuarios').select('*').order('nome');
  if(error){console.error('loadUsers:',error);S.users=[];return;}
  S.users=data||[];
  // Carrega nomes das lojas separadamente
  if(S.lojas.length===0)await loadLojas();
  S.users=S.users.map(u=>({
    ...u,
    loja_nome:S.lojas.find(l=>l.id===u.loja_id)?.nome||null
  }));
}

async function loadPage(page){
  S.loading=true;render();
  try{
    if(!S.lojas.length)await loadLojas();
    if(['dashboard','solicitacoes','cotacoes','relatorios'].includes(page))await loadSol();
    if(['fornecedores','cotacoes','dashboard'].includes(page))await loadForn();
    if(page==='cotacoes'){await loadCot();if(!S.sol.length)await loadSol();}
    if(['pedidos','dashboard'].includes(page))await loadPed();
    if(page==='usuarios')await loadUsers();
  }catch(e){console.error(e);}
  S.loading=false;render();
}

// ── NUMBERS ───────────────────────────────────────────────────────────────
async function genNum(tipo,grupo){
  const tab={SOL:'solicitacoes',COT:'cotacoes',PED:'pedidos'}[tipo];
  const pref=tipo==='SOL'?(grupo==='BMMOT'?'BMM':grupo==='UNIC'?'RC':'DHG'):tipo;
  const {count}=await sb.from(tab).select('*',{count:'exact',head:true});
  return `${pref}-${String((count||0)+1).padStart(4,'0')}`;
}

async function criarSol(f){
  const loja=S.lojas.find(l=>l.id===f.loja_id);
  const num=await genNum('SOL',loja?.grupo||'DHG');
  const solNome=`${S.user.nome} ${S.user.sobrenome}`;
  const solBase={
    numero:num,loja_id:f.loja_id,loja_nome:loja?.nome,
    solicitante_nome:solNome,
    area:S.user.area||f.area,
    categoria:f.cat,descricao:f.desc,
    quantidade:parseInt(f.qtd)||1,
    valor_estimado:parseFloat(f.val)||null,
    urgencia:f.urg||'Baixa',
    justificativa:f.just,
    grupo:loja?.grupo,
    status:'Aguardando Diretoria'
  };
  // Tenta adicionar colunas extras (podem não existir em versões antigas do banco)
  const {data:solData,error}=await sb.from('solicitacoes').insert(solBase).select().single();
  if(error)throw new Error(error.message);
  // Salva usuario_id e itens separadamente para não bloquear
  if(solData?.id){
    await sb.from('solicitacoes').update({usuario_id:S.user.id}).eq('id',solData.id).then(()=>{}).catch(()=>{});
  }
}

async function updateStatus(id,status,obs){
  const upd={status};
  if(obs)upd.observacoes=obs;
  if(status==='Aprovada')upd.data_aprovacao=new Date().toISOString();
  const {error}=await sb.from('solicitacoes').update(upd).eq('id',id);
  if(error)throw new Error(error.message);
}

async function salvarForn(id,f){
  const cats=f.cats?f.cats.split(',').map(c=>c.trim()).filter(Boolean):[];
  const obj={nome:f.nome,cnpj:f.cnpj,contato:f.contato,telefone:f.tel,email:f.email,categorias:cats,avaliacao:parseInt(f.av)||3,grupo:f.grupo||'TODOS'};
  if(id){obj.ativo=document.getElementById('ff-ativo')?.checked!==false;const{error}=await sb.from('fornecedores').update(obj).eq('id',id);if(error)throw new Error(error.message);}
  else{obj.ativo=true;const{error}=await sb.from('fornecedores').insert(obj);if(error)throw new Error(error.message);}
}

async function salvarCot(solId,itens){
  const num=await genNum('COT');
  const sol=S.sol.find(s=>s.id===solId);
  const criador=`${S.user.nome} ${S.user.sobrenome}`;
  const agora=new Date().toISOString();
  const {error}=await sb.from('cotacoes').insert({
    numero:num,solicitacao_id:solId,solicitacao_numero:sol?.numero,
    descricao:sol?.descricao?.slice(0,80),itens:JSON.stringify(itens),
    grupo:sol?.grupo,status:'Aberta',criado_por:criador
  });
  if(error)throw new Error(error.message);
  await sb.from('solicitacoes').update({status:'Aguardando Aprovação Diretoria'}).eq('id',solId);
  await sb.from('solicitacoes').update({cotacao_por:criador,cotacao_data:agora}).eq('id',solId).then(()=>{}).catch(()=>{});
}

async function escolherVencedor(cotId,solId,forn,val){
  const num=await genNum('PED');
  const sol=S.sol.find(s=>s.id===solId);
  const cot=S.cot.find(c=>c.id===cotId);
  const prev=new Date();prev.setDate(prev.getDate()+7);
  const nome=`${S.user.nome} ${S.user.sobrenome}`;
  const agora=new Date().toISOString();
  await sb.from('cotacoes').update({status:'Encerrada',vencedor:forn}).eq('id',cotId);
  await sb.from('solicitacoes').update({status:'Comprada',valor_final:val,fornecedor:forn,comprado_por:nome,comprado_em:agora}).eq('id',solId);
  await sb.from('pedidos').insert({numero:num,solicitacao_id:solId,cotacao_id:cotId,solicitacao_numero:sol?.numero,fornecedor:forn,loja_nome:sol?.loja_nome,descricao:cot?.descricao,valor:val,data_compra:agora.slice(0,10),prev_entrega:prev.toISOString().slice(0,10),status:'Em Trânsito',grupo:sol?.grupo});
}

async function confirmarEntrega(pedId,solId,nf){
  const nome=`${S.user.nome} ${S.user.sobrenome}`;
  const agora=new Date().toISOString();
  // Base update — sempre funciona
  await sb.from('pedidos').update({status:'Entregue',data_entrega:agora.slice(0,10),nf:nf||''}).eq('id',pedId);
  if(solId){
    await sb.from('solicitacoes').update({status:'Entregue'}).eq('id',solId);
    // Auditoria separada — não bloqueia se colunas não existem
    await sb.from('solicitacoes').update({entregue_por:nome,entregue_em:agora}).eq('id',solId).then(()=>{}).catch(()=>{});
  }
}

      const done=!isReprovada&&curIdx>stepIdx;
      const active=!isReprovada&&curIdx===stepIdx;
      const clr=done||active?'#1565C0':'#E0E0E0';
      const bg=active?'#1565C0':done?'#E3F2FD':'#fff';
      const txtColor=active?'#1565C0':done?'#333':'#9E9E9E';
      return `
      ${i>0?`<div style="flex:1;height:2px;background:${clr};margin-top:17px;min-width:10px"></div>`:''}
      <div style="display:flex;flex-direction:column;align-items:center;gap:2px;min-width:76px;max-width:90px">
        <div style="width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;border:2px solid ${clr};background:${bg}">
          ${active?`<span style="color:#fff">${step.icon}</span>`
            :done?`<span style="color:#1565C0;font-weight:700;font-size:13px">✓</span>`
            :`<span style="color:#ccc">${step.icon}</span>`}
        </div>
        <div style="font-size:10px;font-weight:${active?'700':'400'};color:${txtColor};text-align:center;line-height:1.3">${step.label}</div>
        ${(done||active)&&step.sub?`<div style="font-size:10px;color:#1565C0;text-align:center;line-height:1.5;font-weight:500">${step.sub}</div>`:''}
        ${(done||active)&&step.action?step.action:''}
      </div>`;
    }).join('')}
    ${isReprovada?`
    <div style="flex:1;height:2px;background:#FFEBEE;margin-top:17px;min-width:10px"></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;min-width:60px">

      <div style="font-size:10px;font-weight:700;color:#C62828;text-align:center">Reprovada</div>
    </div>`:''}
  </div>`;
}

let itemCount=1;

function adicionarItem(){
  itemCount++;
  const tbody=document.getElementById('itens-tbody');
  if(!tbody)return;
  const n=itemCount;
  const tr=document.createElement('tr');
  tr.id='item-row-'+n;
  tr.innerHTML=`<td style="padding:6px 8px;color:#9E9E9E;font-size:12px">${n}</td>
    <td style="padding:3px 4px"><input class="inp item-desc" style="padding:7px 10px" placeholder="Descricao..."></td>
    <td style="padding:3px 4px"><input class="inp item-qtd" type="number" min="1" value="1" style="padding:7px 6px;text-align:center" oninput="calcTotal()"></td>
    <td style="padding:3px 4px"><input class="inp item-val" type="number" min="0" step="0.01" placeholder="0,00" style="padding:7px 6px;text-align:right" oninput="calcTotal()"></td>
    <td style="padding:6px 8px;text-align:right;font-weight:600;color:#1565C0" id="item-total-${n}">R$ 0,00</td>
    <td style="padding:3px 4px;text-align:center"><button onclick="removerItem('item-row-${n}')" style="background:#FFEBEE;border:none;color:#C62828;border-radius:6px;padding:5px 7px;cursor:pointer">X</button></td>`;
  tbody.appendChild(tr);
}

function removerItem(rowId){
  if(document.querySelectorAll('#itens-tbody tr').length<=1)return alert('Mantenha ao menos 1 item.');
  const r=document.getElementById(rowId);if(r)r.remove();calcTotal();
}

function calcTotal(){
  let total=0,count=0;
  document.querySelectorAll('#itens-tbody tr').forEach(tr=>{
    const qtd=parseFloat(tr.querySelector('.item-qtd')?.value)||0;
    const val=parseFloat(tr.querySelector('.item-val')?.value)||0;
    const sub=qtd*val;total+=sub;if(qtd>0)count++;
    const el=tr.querySelector('[id^="item-total-"]');
    if(el)el.textContent='R$ '+sub.toLocaleString('pt-BR',{minimumFractionDigits:2});
  });
  const ri=document.getElementById('resumo-itens');const rv=document.getElementById('resumo-valor');
  if(ri)ri.textContent=count;
  if(rv)rv.textContent='R$ '+total.toLocaleString('pt-BR',{minimumFractionDigits:2});
}

function showFiles(input){
  const list=document.getElementById('files-list');if(!list)return;list.innerHTML='';
  Array.from(input.files).forEach(f=>{
    const d=document.createElement('div');
    d.style.cssText='display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E0E0E0;border-radius:8px;padding:8px 12px;font-size:12px';
    d.innerHTML=`<span>${f.name.endsWith('.pdf')?'📄':'🖼️'}</span><span style="flex:1">${f.name}</span><span style="color:#9E9E9E">${(f.size/1024).toFixed(0)}KB</span>`;
    list.appendChild(d);
  });
}

function hDrop(e){
  e.preventDefault();
  const input=document.getElementById('sol-files');
  if(input&&e.dataTransfer.files.length){Object.defineProperty(input,'files',{value:e.dataTransfer.files});showFiles(input);}
}

function toggleGruposUser(el){
  ['ugr-dhg','ugr-bmmot','ugr-unic'].forEach(id=>{
    const cb=document.getElementById(id);
    if(cb){cb.disabled=el.checked;if(el.checked)cb.checked=false;}
  });
  const ugr=document.getElementById('ugr');
  if(ugr)ugr.value=el.checked?'TODOS':'';
}

function toggleTodosGrupos(el){
  const gIds=['cu-g-dhg','cu-g-bmmot','cu-g-unic'];
  gIds.forEach(id=>{
    const cb=document.getElementById(id);
    if(cb)cb.disabled=el.checked;
    if(cb&&el.checked)cb.checked=false;
  });
}

  const tipo=document.getElementById('sti')?.value||'Servico';

  if(!sel)return;
  const cats=CATS_MAP[tipo]||CATS_MAP['Servico'];
  sel.innerHTML=cats.map(c=>`<option>${c}</option>`).join('');

async function hCriarSOL(){
  const loja_id=V('sl'),area=V('sa'),tipo=V('sti'),cat=V('sc'),urg=V('su'),just=V('sj'),data_est=V('sdt');
  if(!loja_id)return alert('Selecione a loja.');
  if(!just.trim())return alert('Preencha a justificativa.');
  const itens=[];let valorTotal=0;
  document.querySelectorAll('#itens-tbody tr').forEach(tr=>{
    const desc=tr.querySelector('.item-desc')?.value?.trim();
    const qtd=parseFloat(tr.querySelector('.item-qtd')?.value)||0;
    const val=parseFloat(tr.querySelector('.item-val')?.value)||0;
    if(desc){itens.push({desc,qtd,val,total:qtd*val});valorTotal+=qtd*val;}
  });
  if(!itens.length)return alert('Adicione ao menos 1 item com descricao.');
  const files=document.getElementById('sol-files')?.files;
  const fileNames=files&&files.length?Array.from(files).map(f=>f.name).join(', '):'';
  const loja=S.lojas.find(l=>l.id===loja_id);
  const num=await genNum('SOL',loja?.grupo||'DHG');
  const descricao=itens.map(i=>i.qtd+'x '+i.desc).join(' | ').slice(0,200);
  const {error}=await sb.from('solicitacoes').insert({
    numero:num,loja_id,loja_nome:loja?.nome,
    solicitante_nome:`${S.user.nome} ${S.user.sobrenome}`,
    usuario_id:S.user.id,area,
    tipo_compra:tipo,categoria:cat,urgencia:urg,
    descricao,justificativa:just,
    quantidade:itens.reduce((a,b)=>a+b.qtd,0),
    valor_estimado:valorTotal,
    data_estimada:data_est||null,
    itens_requisicao:itens,
    anexos:fileNames||null,
    grupo:loja?.grupo,status:'Aguardando Diretoria'
  });
  if(error)return alert('Erro: '+error.message);
  closeModal();await loadSol();render();
  alert('Requisicao '+num+' enviada! Itens: '+itens.length+' - Total: R$ '+valorTotal.toLocaleString('pt-BR',{minimumFractionDigits:2}));
}

async function hEntSol(solId,pedId){
  const nf=document.getElementById('ent-nf')?.value?.trim();
  const dt=document.getElementById('ent-dt')?.value;
  const rec=document.getElementById('ent-rec')?.value?.trim();
  const cond=document.getElementById('ent-cond')?.value||'';
  if(!nf)return alert('Informe o número da Nota Fiscal.');
  if(!rec)return alert('Informe quem recebeu o item.');
  const agora=new Date().toISOString();
  const nome=`${S.user.nome} ${S.user.sobrenome}`;
  try{
    // Atualiza solicitação
    await sb.from('solicitacoes').update({status:'Entregue'}).eq('id',solId);
    await sb.from('solicitacoes').update({entregue_por:nome,entregue_em:agora}).eq('id',solId).then(()=>{}).catch(()=>{});
    // Atualiza pedido se existir
    if(pedId){
      await sb.from('pedidos').update({status:'Entregue',data_entrega:dt||agora.slice(0,10),nf}).eq('id',pedId);
      await sb.from('pedidos').update({recebido_por:rec,condicao_entrega:cond}).eq('id',pedId).then(()=>{}).catch(()=>{});
    }
    closeModal();
    await loadSol();await loadPed();render();
    alert('✅ Entrega confirmada!\nNF: '+nf+'\nRecebido por: '+rec+'\n\nSolicitação finalizada com sucesso!');
  }catch(e){alert('Erro: '+e.message);}
}

async function sincronizarPedidos(){
  // Busca solicitações Comprada/Entregue sem pedido
  const solCompradas=S.sol.filter(s=>['Comprada','Entregue'].includes(s.status));
  const pedSolIds=new Set(S.ped.map(p=>p.solicitacao_id).filter(Boolean));
  const semPedido=solCompradas.filter(s=>!pedSolIds.has(s.id));

  if(!semPedido.length){
    return alert('✅ Tudo sincronizado! Não há solicitações sem pedido.');
  }

  if(!confirm(`Encontrei ${semPedido.length} solicitação(ões) sem pedido:\n\n${semPedido.map(s=>s.numero+' — '+s.fornecedor).join('\n')}\n\nDeseja criar os pedidos faltantes?`))return;

  let criados=0, erros=0;
  for(const s of semPedido){
    try{
      const num=await genNum('PED');
      const prev=new Date(s.comprado_em||s.data_criacao||Date.now());
      prev.setDate(prev.getDate()+7);
      const pedBase={
        numero:num,
        solicitacao_id:s.id,
        solicitacao_numero:s.numero,
        fornecedor:s.fornecedor||'—',
        loja_nome:s.loja_nome,
        descricao:s.descricao,
        valor:s.valor_final||s.valor_estimado||0,
        data_compra:(s.comprado_em||new Date().toISOString()).slice(0,10),
        prev_entrega:prev.toISOString().slice(0,10),
        status:s.status==='Entregue'?'Entregue':'Em Trânsito',
        grupo:s.grupo
      };
      const {data:pedData,error}=await sb.from('pedidos').insert(pedBase).select().single();
      if(error)throw error;
      // Tenta salvar campos extras
      if(pedData?.id){
        await sb.from('pedidos').update({
          valor_final_compra:s.valor_final||null,
          desconto:s.desconto||null,
          saving_pct:s.saving_pct||null,
          cotacao_id:s.cotacao_id||null,
          nf:s.nf||null
        }).eq('id',pedData.id).then(()=>{}).catch(()=>{});
      }
      criados++;
    }catch(e){
      console.error('Erro ao criar pedido para '+s.numero+':',e);
      erros++;
    }
  }
  await loadPed();render();
  alert(`✅ Sincronização concluída!\n${criados} pedido(s) criado(s)${erros?'\n⚠️ '+erros+' erro(s) — verifique o console':''}`);
}

function calcSavingEdit(valAprov){
  const vf=parseFloat(document.getElementById('ev-final')?.value)||0;
  const desc=valAprov-vf;
  const pct=valAprov>0?((desc/valAprov)*100):0;
  const elVf=document.getElementById('ev-vf');
  const elEco=document.getElementById('ev-eco');
  const elPct=document.getElementById('ev-pct');
  const preview=document.getElementById('ev-preview');
  if(elVf)elVf.textContent=fmt(vf);
  if(elEco){elEco.textContent=fmt(Math.abs(desc));elEco.style.color=desc>=0?'#2E7D32':'#C62828';}
  if(elPct){elPct.textContent=(desc>=0?'':'-')+Math.abs(pct).toFixed(1)+'%';elPct.style.color=desc>=0?'#2E7D32':'#C62828';}
  if(preview){preview.style.background=desc>0?'#E8F5E9':desc<0?'#FFEBEE':'#F8F9FA';preview.style.borderColor=desc>0?'#A5D6A7':desc<0?'#FFCDD2':'#E0E0E0';}
}

async function salvarEditValor(pedId,valAprov){
  const vf=parseFloat(document.getElementById('ev-final')?.value);
  const pgto=document.getElementById('ev-pgto')?.value||'';
  if(!vf||vf<=0)return alert('Informe o valor final corretamente.');
  const desc=valAprov-vf;
  const pct=valAprov>0?Math.round((desc/valAprov)*1000)/10:0;
  try{
    await sb.from('pedidos').update({
      valor_final_compra:vf,
      desconto:desc,
      saving_pct:pct,
      forma_pagamento_oc:pgto
    }).eq('id',pedId);
    // Atualiza solicitação também
    const p=S.ped.find(x=>x.id===pedId);
    if(p?.solicitacao_id){
      await sb.from('solicitacoes').update({valor_final:vf}).eq('id',p.solicitacao_id).then(()=>{}).catch(()=>{});
    }
    closeModal();
    await loadPed();render();
    alert('✅ Valor salvo!\nValor Final: '+fmt(vf)+'\nSaving: '+fmt(desc)+' ('+pct+'%)');
  }catch(e){alert('Erro: '+e.message);}
}

async function confirmarOC(solId,cotId,forn,valAprov){
  const vf=parseFloat(document.getElementById('oc-valfinal')?.value)||parseFloat(valAprov);
  const pgto=document.getElementById('oc-pgto')?.value||'';
  const data=document.getElementById('oc-data')?.value||new Date().toISOString().slice(0,10);
  const cc=document.getElementById('oc-cc')?.value||'';
  const obs=document.getElementById('oc-obs')?.value||'';
  const fileEl=document.getElementById('oc-file');
  const fileObj3=fileEl?.files?.[0]||null;
  let arquivo='';
  if(fileObj3){const up=await uploadAnexo(fileObj3);arquivo=up?JSON.stringify(up):fileObj3.name||'';}
  if(!vf||vf<=0)return alert('Informe o valor final da compra.');
  if(!pgto)return alert('Selecione a forma de pagamento.');
  const desc=parseFloat(valAprov)-vf;
  const pct=parseFloat(valAprov)>0?((desc/parseFloat(valAprov))*100):0;
  const nome=`${S.user.nome} ${S.user.sobrenome}`;
  const agora=new Date().toISOString();
  const num=await genNum('PED');
  const sol=S.sol.find(s=>s.id===solId);
  const prev=new Date(data);prev.setDate(prev.getDate()+7);
  try{
    // 1. Fecha cotação apenas quando a compra é confirmada (não antes)
    if(cotId){
      await sb.from('cotacoes').update({status:'Encerrada',vencedor:forn}).eq('id',cotId).then(()=>{}).catch(()=>{});
    }
    // 2. Atualiza solicitação — colunas base sempre existem
    await sb.from('solicitacoes').update({status:'Comprada',valor_final:vf}).eq('id',solId);
    // 3. Tenta salvar auditoria (pode falhar se colunas não existem)
    await sb.from('solicitacoes').update({comprado_por:nome,comprado_em:agora}).eq('id',solId).then(()=>{}).catch(()=>{});
    // 4. Cria pedido com colunas base (sempre funcionam)
    const pedBase={
      numero:num,solicitacao_id:solId,
      solicitacao_numero:sol?.numero,fornecedor:forn,
      loja_nome:sol?.loja_nome,descricao:sol?.descricao,
      valor:parseFloat(valAprov)||vf,
      data_compra:data,
      prev_entrega:prev.toISOString().slice(0,10),
      status:'Em Trânsito',grupo:sol?.grupo
    };
    if(cotId)pedBase.cotacao_id=cotId;
    const {data:pedData,error:pedErr}=await sb.from('pedidos').insert(pedBase).select().single();
    if(pedErr)throw new Error('Erro ao criar pedido: '+pedErr.message);
    // 5. Tenta salvar colunas extras do pedido (pode falhar se ALTER TABLE não foi executado)
    if(pedData?.id){
      await sb.from('pedidos').update({
        valor_final_compra:vf,desconto:desc,
        saving_pct:Math.round(pct*10)/10,
        forma_pagamento_oc:pgto,centro_custo:cc,
        obs_compra:obs
      }).eq('id',pedData.id).then(()=>{}).catch(()=>{});
    }
    closeModal();
    await loadSol();await loadPed();render();
    alert('✅ Ordem de Compra gerada!\nPedido: '+num+'\nFornecedor: '+forn+'\nValor Final: '+fmt(vf)+(desc>0?'\nSaving: '+fmt(desc)+' ('+pct.toFixed(1)+'%)':'')+'\n\nAguardando entrega.');
  }catch(e){alert('Erro: '+e.message);}
}

async function hForn(id){
  const f={nome:V('fn'),cnpj:V('fc'),contato:V('fct'),tel:V('ft'),email:V('fe'),cats:V('fca'),av:V('fav'),grupo:V('fg')};
  if(!f.nome)return alert('Nome é obrigatório.');
  try{await salvarForn(id||null,f);closeModal();await loadForn();render();}catch(e){alert(e.message);}
}

let cotFiltro={q:'',status:'',grupo:'',loja:''};

      const s=S.sol.find(x=>x.id===c.solicitacao_id);

      const sg=s.grupo==='DHC'?'DHG':s.grupo;

let _cotSolId='';
function loadItensCot(solId){
  _cotSolId=solId;
  const sel=document.getElementById('cot-sol');
  const opt=sel?.querySelector(`option[value="${solId}"]`);
  if(!opt)return;
  let itens=[];
  try{itens=JSON.parse(opt.dataset.itens||'[]');}catch(e){itens=[];}

  // If no itens_requisicao, create a single generic item from descricao
  if(!itens.length){
    const sol=S.sol.find(s=>s.id===solId);
    if(sol)itens=[{desc:sol.descricao,qtd:sol.quantidade||1,val:0,total:0}];
  }

  const block=document.getElementById('cot-fornecedores');
  if(block)block.style.display='block';

  [1,2,3].forEach(n=>{
    const tbody=document.getElementById(`cf${n}-itens`);
    if(!tbody)return;
    tbody.innerHTML=itens.map((item,idx)=>`
      <tr style="border-bottom:1px solid #F0F2F5">
        <td style="padding:8px 10px;color:#9E9E9E;font-size:11px;text-align:center">${idx+1}</td>
        <td style="padding:8px 10px;font-size:12px">${item.desc||item.descricao||'—'}</td>
        <td style="padding:8px 10px;text-align:center;font-weight:600">${item.qtd||1}</td>
        <td style="padding:4px 6px">
          <input type="number" min="0" step="0.01" placeholder="0,00"
            style="width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:6px;font-size:12px;text-align:right"
            data-qtd="${item.qtd||1}" data-idx="${idx}"
            oninput="calcTotalForn(${n})"
            class="cf${n}-vunit">
        </td>
        <td style="padding:8px 10px;text-align:right;font-weight:600;color:#1565C0;font-size:12px" id="cf${n}-row${idx}-total">R$ 0,00</td>
      </tr>`).join('');
  });
}

function calcTotalForn(n){
  let total=0;
  document.querySelectorAll(`.cf${n}-vunit`).forEach(inp=>{
    const qtd=parseFloat(inp.dataset.qtd)||1;
    const vunit=parseFloat(inp.value)||0;
    const sub=qtd*vunit;
    total+=sub;
    const idx=inp.dataset.idx;
    const el=document.getElementById(`cf${n}-row${idx}-total`);
    if(el)el.textContent='R$ '+sub.toLocaleString('pt-BR',{minimumFractionDigits:2});
  });
  const el=document.getElementById(`cf${n}-total`);
  if(el)el.textContent='R$ '+total.toLocaleString('pt-BR',{minimumFractionDigits:2});
}

async function hCot(){
  const solId=document.getElementById('cot-sol')?.value||_cotSolId;
  if(!solId)return alert('Selecione uma solicitação.');
  const sel=document.getElementById('cot-sol');
  const opt=sel?.querySelector(`option[value="${solId}"]`)||sel?.querySelector(`option[value="${_cotSolId}"]`);
  let solItens=[];
  try{solItens=JSON.parse(opt?.dataset?.itens||'[]');}catch(e){solItens=[];}

  const it=[];
  for(let n=1;n<=3;n++){
    const nome=document.getElementById(`cf${n}-nome`)?.value?.trim();
    if(!nome)continue;
    const cnpj=document.getElementById(`cf${n}-cnpj`)?.value?.trim();
    const data=document.getElementById(`cf${n}-data`)?.value||'';
    const valid=document.getElementById(`cf${n}-valid`)?.value||'';
    const pgto=document.getElementById(`cf${n}-pgto`)?.value||'';
    const obs=document.getElementById(`cf${n}-obs`)?.value||'';
    // Collect item prices
    const itensForn=[];
    let valTotal=0;
    document.querySelectorAll(`.cf${n}-vunit`).forEach((inp,idx)=>{
      const item=solItens[idx]||{};
      const qtd=parseFloat(inp.dataset.qtd)||1;
      const vunit=parseFloat(inp.value)||0;
      const total=qtd*vunit;
      valTotal+=total;
      itensForn.push({desc:item.desc||item.descricao||'Item '+(idx+1),qtd,vunit,total});
    });
    const fileInput=document.getElementById(`cf${n}-file`);
    const arquivo=fileInput?.files?.[0]?.name||'';
    it.push({forn:nome,cnpj,val:valTotal,prazo:0,pgto,obs,data,validade:valid,itens:itensForn,arquivo});
  }

  if(it.length<2)return alert('Preencha ao menos 2 fornecedores para continuar.');
  if(it.some(i=>i.val<=0))return alert('Preencha os valores unitários de todos os itens.');
  try{
    await salvarCot(solId,it);
    closeModal();
    await loadCot();
    await loadSol();
    render();
    alert(`✅ ${it.length} orçamentos enviados para aprovação da Diretoria!`);
  }catch(e){alert(e.message);}
}

async function salvarFornOrc2(n){
  const nome=document.getElementById(`cf${n}-nome`)?.value?.trim();
  const cnpj=document.getElementById(`cf${n}-cnpj`)?.value?.trim();
  if(!nome)return alert('Preencha o nome do fornecedor antes de salvar.');
  if(cnpj){
    const cnpjLimpo=cnpj.replace(/\D/g,'');
    const {data:exist}=await sb.from('fornecedores').select('id,nome').ilike('cnpj','%'+cnpjLimpo.slice(0,8)+'%');
    if(exist&&exist.length>0)return alert(`CNPJ já cadastrado para: "${exist[0].nome}"`);
  }
  if(!confirm(`Salvar "${nome}" no cadastro de fornecedores?`))return;
  try{
    // Verificar nome duplicado

async function uploadAnexo(file){
  if(!file)return null;
  try{
    const nome=`${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const {data,error}=await sb.storage.from('anexos').upload(nome,file,{
      cacheControl:'3600',upsert:false,contentType:file.type
    });
    if(error)throw error;
    const {data:url}=sb.storage.from('anexos').getPublicUrl(nome);
    return {nome:file.name,url:url.publicUrl};
  }catch(e){
    console.warn('Upload falhou:',e.message);
    return {nome:file.name,url:null};
  }
}

function fmtCNPJ(el){
  let v=el.value.replace(/\D/g,'').slice(0,14);
  if(v.length>12)v=v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/,'$1.$2.$3/$4-$5');
  else if(v.length>8)v=v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})/,'$1.$2.$3/$4');
  else if(v.length>5)v=v.replace(/(\d{2})(\d{3})(\d{3})/,'$1.$2.$3');
  else if(v.length>2)v=v.replace(/(\d{2})(\d{3})/,'$1.$2');
  el.value=v;
}

function calcMelhor(){
  const vals=[1,2,3].map(n=>{
    const forn=document.getElementById(`cf${n}-nome`)?.value;
    const totalEl=document.getElementById(`cf${n}-total`);
    const valStr=totalEl?.textContent?.replace(/[R$\s.]/g,'').replace(',','.')||'0';
    const val=parseFloat(valStr)||0;
    return forn&&val>0?{forn,val}:null;
  }).filter(Boolean);
  const el=document.getElementById('melhor-preco');
  const txt=document.getElementById('melhor-txt');
  if(vals.length>=2){
    const best=vals.reduce((a,b)=>a.val<b.val?a:b);
    if(el)el.style.display='block';
    if(txt)txt.textContent=`${best.forn} — ${fmt(best.val)}`;
  } else {
    if(el)el.style.display='none';
  }
}

// ── FUNÇÕES DE FILTRO ────────────────────────────────────────────────────
function aplicarFiltroBase(s){
  // Aplica filtros de período, grupo, loja e área em uma solicitação
  if(relFiltros.de||relFiltros.ate){
    // Usa data de criação para filtrar período
    const d=(s.data_criacao||'').slice(0,7);
    if(relFiltros.de&&d<relFiltros.de)return false;
    if(relFiltros.ate&&d>relFiltros.ate)return false;
  }
  if(relFiltros.grupo){
    // Determina o grupo pela solicitação: campo grupo OU prefixo do número
    const grpSol=s.grupo||(s.numero?.startsWith('BMM')?'BMMOT':s.numero?.startsWith('RC')?'UNIC':'DHG');
    if(grpSol!==relFiltros.grupo)return false;
  }
  if(relFiltros.loja&&s.loja_id!==relFiltros.loja)return false;
  if(relFiltros.area&&s.area!==relFiltros.area)return false;
  return true;
}

function filtrarSol(){
  const base=filtrarPorAcesso(S.sol);
  return base.filter(s=>['Comprada','Entregue'].includes(s.status)&&aplicarFiltroBase(s));
}

function filtrarAllSol(){
  const base=filtrarPorAcesso(S.sol);
  return base.filter(s=>aplicarFiltroBase(s));
}

function filtrarPed(){
  const solIds=new Set(filtrarSol().map(s=>s.id));
  return filtrarPorAcesso(S.ped).filter(p=>solIds.has(p.solicitacao_id)||
    // Também inclui pedidos sem solicitacao_id mas do período
    (!p.solicitacao_id&&aplicarFiltroBase({
      data_criacao:p.data_compra,
      grupo:p.grupo,
      loja_id:p.loja_id
    }))
  );
}

function calcValorFinal(sol,ped){
  // Valor final: prioridade ao valor_final_compra do pedido,
  // depois valor_final da solicitação, depois valor do pedido,
  // por último valor_estimado
  return ped?.valor_final_compra||sol?.valor_final||ped?.valor||sol?.valor_estimado||0;
}

function calcSavingRel(sol,ped){
  // Saving = valor estimado (orçado) - valor final pago
  // Se desconto já calculado no pedido, usa direto
  if(ped?.desconto&&ped.desconto>0)return ped.desconto;
  const estimado=sol?.valor_estimado||ped?.valor||0;
  const final=calcValorFinal(sol,ped);
  return Math.max(0,estimado-final);
}

function exportarRel(){
  const sol=filtrarSol();
  const ped=filtrarPed();
  let csv='Número,Loja,Área,Categoria,Fornecedor,Valor Orçado,Valor Final,Desconto,Saving %,Status,Data Compra\n';
  ped.forEach(p=>{
    const s=S.sol.find(x=>x.id===p.solicitacao_id);
    const desc=p.desconto||0;
    const pct=p.valor>0?(desc/p.valor*100).toFixed(1):0;
    csv+=`"${p.solicitacao_numero||''}","${p.loja_nome||''}","${s?.area||''}","${s?.categoria||''}","${p.fornecedor||''}",${p.valor||0},${p.valor_final_compra||p.valor||0},${desc},${pct}%,"${p.status||''}","${p.data_compra||''}"\n`;
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='relatorio_compras.csv';a.click();
  URL.revokeObjectURL(url);
}

function prevL(){
  const n=V('un'),s=V('uss'),el=document.getElementById('ulp');

}

async function hCriarUser(){
  const nome=V('un'),sob=V('uss'),perfil=V('upr'),area=V('uar'),grupo=V('ugr'),loja=V('ulo'),senha=V('use'),senha2=V('use2');
  const err=document.getElementById('ue');
  const showErr=m=>{if(err){err.style.display='block';err.textContent=m;}};
  if(err)err.style.display='none';
  if(!nome||!sob){showErr('Preencha nome e sobrenome.');return;}
  if(!senha||senha.length<6){showErr('Senha deve ter mínimo 6 caracteres.');return;}
  if(senha!==senha2){showErr('As senhas não coincidem.');return;}
  const login=slug(`${nome} ${sob}`);
  if(!login||login.length<3){showErr('Nome inválido para gerar login.');return;}
  const btn=document.getElementById('btn-criar');
  if(btn){btn.textContent='Criando...';btn.disabled=true;}
  try{
    const todosGrp=document.getElementById('ugr-todos')?.checked;
    const grpsSel=todosGrp?['TODOS']:['DHG','BMMOT','UNIC'].filter(g=>document.getElementById('ugr-'+g.toLowerCase())?.checked);
    const grupoFinal=todosGrp?'TODOS':grpsSel[0]||grupo||'TODOS';
    const lojaEl=document.getElementById('ulo');
    const lojasSel=lojaEl?Array.from(lojaEl.selectedOptions).map(o=>o.value):['TODOS'];
    const primeiraLoja=lojasSel.find(l=>l!=='TODOS')||null;
    const {error}=await sb.from('usuarios').insert({
      nome,sobrenome:sob,login,senha_hash:hash,
      perfil,area,grupo:grupoFinal,
      loja_id:primeiraLoja||null,ativo:true,
      grupos:grpsSel.length?grpsSel:['TODOS'],
      lojas_acesso:lojasSel.includes('TODOS')?['TODOS']:lojasSel
    });
    if(error){
      if(error.message.includes('unique'))throw new Error(`Login "${login}" já existe. Tente um nome diferente.`);
      throw new Error(error.message);
    }
    closeModal();await loadUsers();render();
    alert(`✅ Usuário criado!\n\nLogin: ${login}\nSenha: a que você definiu\n\nCompartilhe com ${nome}.`);
  }catch(e){
    showErr(e.message);
    if(btn){btn.textContent='Criar Usuário';btn.disabled=false;}
  }
}

async function hSenha(id,loginAtual){
  const novoLogin=V('nl').trim().toLowerCase();
  const s1=V('ns1'),s2=V('ns2');
  // Valida
  if(!novoLogin&&!s1)return alert('Preencha ao menos o novo login ou a nova senha.');
  if(s1&&s1.length<6)return alert('Senha deve ter mínimo 6 caracteres.');
  if(s1&&s1!==s2)return alert('As senhas não coincidem.');
  if(novoLogin&&novoLogin===loginAtual)return alert('O novo login é igual ao atual.');
  if(novoLogin&&!/^[a-z0-9.]+$/.test(novoLogin))return alert('Login inválido. Use apenas letras, números e ponto.');
  try{
    const upd={};
    if(novoLogin){
      // Verifica se login já existe
      const {data:exist}=await sb.from('usuarios').select('id').eq('login',novoLogin).single();
      if(exist)return alert(`Login "${novoLogin}" já está em uso.`);
      upd.login=novoLogin;
    }
    if(s1){
      upd.senha_hash=await hashSenha(s1);
    }
    const {error}=await sb.from('usuarios').update(upd).eq('id',id);
    if(error)throw new Error(error.message);
    closeModal();
    await loadUsers();render();
    const msgs=[];
    if(novoLogin)msgs.push(`Login: ${novoLogin}`);
    if(s1)msgs.push('Senha atualizada');
    alert('✅ Alterações salvas! ' + msgs.join(' | '));
  }catch(e){alert(e.message);}
}

function getBadge(page){
  let n=0;
  const mySol=filtrarPorAcesso(S.sol);
  const myPed=S.ped.filter(p=>!p.solicitacao_id||solIdsAcesso().has(p.solicitacao_id));
  if(page==='solicitacoes'){
    if(isDiretoria())n=mySol.filter(s=>s.status==='Aguardando Diretoria'||s.status==='Aguardando Aprovação Diretoria').length;
    if(isGerente()&&!isDiretoria())n=mySol.filter(s=>s.status==='Aguardando Aprovação Gerente').length;
    if(isCompras()&&!isDiretoria())n=mySol.filter(s=>s.status==='Aprovada'||s.status==='Comprada').length;
  }
  if(page==='cotacoes'&&isCompras())n=mySol.filter(s=>s.status==='Aguardando Orçamento').length;
  if(page==='pedidos'&&isCompras())n=myPed.filter(p=>p.status!=='Entregue').length;
  return n>0?`<span style="background:#E53935;color:#fff;border-radius:10px;font-size:9px;font-weight:700;padding:1px 6px;min-width:16px;text-align:center;position:absolute;right:8px;top:50%;transform:translateY(-50%)">${n}</span>`:'';
}

// ── LATE DELIVERY CHECK ────────────────────────────────────────────────────
function isLate(dateStr){
  if(!dateStr)return false;
  return new Date(dateStr)<new Date();
}
